# Railway deployment configuration for Prometheus
#
# Deploys Prometheus monitoring service that scrapes metrics from Railway internal services.
#
# Usage:
#   railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "prometheus/dockerfile"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

watchPaths = [
    "prometheus/**"
]
