apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-receiver
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_ALERTS}"
          title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
          text: |
            **{{ .CommonLabels.alertname }}**
            Status: {{ .Status | toUpper }}
            Severity: {{ .CommonLabels.severity }}

            {{ range .Alerts }}
            {{ .Annotations.summary }}
            {{ end }}
