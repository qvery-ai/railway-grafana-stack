apiVersion: 1

groups:
  - orgId: 1
    name: api-alerts
    folder: API Alerts
    interval: 1m
    rules:
      # ---------------------------------------------------------------
      # API service is down / unreachable by Prometheus
      # ---------------------------------------------------------------
      - uid: api-down
        title: API Target Down
        condition: A
        noDataState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API service is unreachable by Prometheus"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: up{job="api"} == 0

      # ---------------------------------------------------------------
      # High 5xx error rate (> 5% of requests over 5 min)
      # ---------------------------------------------------------------
      - uid: api-high-error-rate
        title: API High Error Rate
        condition: C
        noDataState: OK
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate is above 5%"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(rate(http_requests_total{job="api", status=~"5.."}[5m]))
          - refId: B
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              expr: sum(rate(http_requests_total{job="api"}[5m]))
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: math
              expression: "$A / $B > 0.05"
              conditions:
                - evaluator:
                    type: gt
                    params: [0]

      # ---------------------------------------------------------------
      # High p95 latency (> 2 seconds over 5 min)
      # ---------------------------------------------------------------
      - uid: api-high-latency
        title: API High Latency (p95)
        condition: A
        noDataState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is above 2 seconds"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="api"}[5m])) by (le)) > 2

  - orgId: 1
    name: worker-alerts
    folder: Worker Alerts
    interval: 1m
    rules:
      # ---------------------------------------------------------------
      # Agents worker is down (Prometheus target)
      # ---------------------------------------------------------------
      - uid: agents-worker-down
        title: Agents Worker Down
        condition: A
        noDataState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agents worker is unreachable by Prometheus"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: up{job="agents-worker"} == 0

      # ---------------------------------------------------------------
      # ETL worker is down (Prometheus target)
      # ---------------------------------------------------------------
      - uid: etl-worker-down
        title: ETL Worker Down
        condition: A
        noDataState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ETL worker is unreachable by Prometheus"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: up{job="etl-worker"} == 0

  # ====================================================================
  # Temporal Worker Alerts — Critical
  # ====================================================================
  - orgId: 1
    name: temporal-critical-alerts
    folder: Temporal Alerts
    interval: 1m
    rules:
      # ---------------------------------------------------------------
      # Agents worker dead — no active pollers
      # ---------------------------------------------------------------
      - uid: agents-pollers-dead
        title: Agents Worker Dead (No Pollers)
        condition: A
        noDataState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agents worker has zero active pollers — worker is dead or disconnected from Temporal"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: temporal_num_pollers{job="agents-worker"} == 0

      # ---------------------------------------------------------------
      # ETL worker dead — no active pollers
      # ---------------------------------------------------------------
      - uid: etl-pollers-dead
        title: ETL Worker Dead (No Pollers)
        condition: A
        noDataState: OK
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ETL worker has zero active pollers — worker is dead or disconnected from Temporal"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: temporal_num_pollers{job="etl-worker"} == 0

      # ---------------------------------------------------------------
      # Activity queue backlog — tasks waiting too long to be picked up
      # ---------------------------------------------------------------
      - uid: activity-queue-backlog
        title: Activity Queue Backlog
        condition: A
        noDataState: OK
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Activity tasks are waiting > 5s in queue — not enough workers or activity slots"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: histogram_quantile(0.95, sum(rate(temporal_activity_schedule_to_start_latency_bucket[5m])) by (le, job)) > 5

      # ---------------------------------------------------------------
      # Workflow task queue backlog — workflow tasks waiting too long
      # ---------------------------------------------------------------
      - uid: workflow-queue-backlog
        title: Workflow Task Queue Backlog
        condition: A
        noDataState: OK
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Workflow tasks are waiting > 2s in queue — not enough workers"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: histogram_quantile(0.95, sum(rate(temporal_workflow_task_schedule_to_start_latency_bucket[5m])) by (le, job)) > 2

  # ====================================================================
  # Temporal Worker Alerts — Warning
  # ====================================================================
  - orgId: 1
    name: temporal-warning-alerts
    folder: Temporal Alerts
    interval: 1m
    rules:
      # ---------------------------------------------------------------
      # Worker saturated — running out of activity slots
      # ---------------------------------------------------------------
      - uid: worker-saturated
        title: Worker Saturated (Low Activity Slots)
        condition: A
        noDataState: OK
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker has fewer than 5 available activity slots — close to saturation"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: min(temporal_worker_task_slots_available{worker_type=~"ActivityWorker|activity"}) by (job) < 5

      # ---------------------------------------------------------------
      # High workflow failure rate (> 5% over 10 min)
      # Uses clamp_min to handle division by zero when completions are 0
      # ---------------------------------------------------------------
      - uid: high-workflow-failure-rate
        title: High Workflow Failure Rate
        condition: C
        noDataState: OK
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Workflow failure rate is above 5%"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: sum(rate(temporal_workflow_failed[5m])) by (job)
          - refId: B
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: B
              expr: clamp_min(sum(rate(temporal_workflow_completed[5m]) + rate(temporal_workflow_failed[5m])) by (job), 0.001)
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: math
              expression: "$A / $B > 0.05"
              conditions:
                - evaluator:
                    type: gt
                    params: [0]


      # ---------------------------------------------------------------
      # Activity failure spike
      # ---------------------------------------------------------------
      - uid: activity-failure-spike
        title: Activity Failure Spike
        condition: A
        noDataState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Activity failures are elevated — check activity logs"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(rate(temporal_activity_execution_failed[5m])) by (job) > 0.1

      # ---------------------------------------------------------------
      # Slow activities — p95 > 60s
      # ---------------------------------------------------------------
      - uid: slow-activities
        title: Slow Activities (p95 > 60s)
        condition: A
        noDataState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Activity p95 latency is above 60 seconds"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: histogram_quantile(0.95, sum(rate(temporal_activity_execution_latency_bucket[5m])) by (le, job)) > 60

      # ---------------------------------------------------------------
      # gRPC failure rate to Temporal server (> 5%)
      # ---------------------------------------------------------------
      - uid: temporal-grpc-failures
        title: Temporal gRPC Failure Rate High
        condition: C
        noDataState: OK
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "gRPC failure rate to Temporal server is above 5%"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: sum(rate(temporal_request_failure[5m])) by (job)
          - refId: B
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              expr: sum(rate(temporal_request[5m])) by (job)
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: math
              expression: "$A / $B > 0.05"
              conditions:
                - evaluator:
                    type: gt
                    params: [0]

      # ---------------------------------------------------------------
      # Sticky cache pressure — high eviction rate
      # ---------------------------------------------------------------
      - uid: sticky-cache-pressure
        title: Sticky Cache Pressure
        condition: A
        noDataState: OK
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High sticky cache eviction rate — workflows are replaying frequently, impacting performance"
        data:
          - refId: A
            datasourceUid: grafana_prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: sum(rate(temporal_sticky_cache_total_forced_eviction[5m])) by (job) > 1
