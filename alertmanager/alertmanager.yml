route:
  receiver: slack-alerts
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_ALERTS}"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}{{ if .CommonLabels.job }} — {{ .CommonLabels.job }}{{ end }}"
        text: |
          {{ range .Alerts }}
          *{{ .Labels.alertname }}*
          Job: `{{ .Labels.job }}` | Instance: `{{ .Labels.instance }}`
          Severity: `{{ .Labels.severity }}`
          {{ .Annotations.summary }}
          {{ if .Annotations.description }}
          _What to do:_ {{ .Annotations.description }}
          {{ end }}
          {{ end }}
