groups:
  # ====================================================================
  # API Alerts
  # ====================================================================
  - name: api-alerts
    rules:
      - alert: APITargetDown
        expr: up{job="api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API service is unreachable by Prometheus"
          description: "1. Check if the API service is running (Railway dashboard or `railway status`). 2. Verify the /metrics endpoint is accessible. 3. Check Prometheus targets page for scrape errors. 4. Review API service logs for crash loops or OOM kills."

      - alert: APIHighErrorRate
        expr: sum by (job, instance) (rate(http_requests_total{job="api", status=~"5.."}[5m])) / sum by (job, instance) (rate(http_requests_total{job="api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate is above 5%"
          description: "1. Check API logs for error stack traces and common 5xx patterns. 2. Look for recent deployments that may have introduced regressions. 3. Verify downstream dependencies (database, Temporal, external APIs) are healthy. 4. Check if the error is isolated to specific endpoints using per-route metrics."

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, sum by (le, job, instance) (rate(http_request_duration_seconds_bucket{job="api", handler!~".*/stream"}[5m]))) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is above 2 seconds"
          description: "1. Identify slow endpoints from per-route latency metrics. 2. Check database query performance and connection pool usage. 3. Look for resource contention (CPU, memory) on the API service. 4. Verify external API dependencies are responding within SLA. Note: SSE streaming endpoints are excluded from this alert — they have long-lived connections by design."

      - alert: APIStreamingTimeout
        expr: histogram_quantile(0.95, sum by (le, job, instance) (rate(http_request_duration_seconds_bucket{job="api", handler=~".*/stream"}[5m]))) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SSE streaming responses are exceeding 30 seconds"
          description: "1. Check if LLM provider is responding slowly or timing out. 2. Look for stuck streaming connections that are not completing. 3. Verify agent workflow execution is progressing (check Temporal). 4. Review API logs for streaming errors or connection drops."

  # ====================================================================
  # Worker Target Alerts
  # ====================================================================
  - name: worker-alerts
    rules:
      - alert: AgentsWorkerDown
        expr: up{job="agents-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agents worker is unreachable by Prometheus"
          description: "1. Check if the agents-worker service is running in Railway. 2. Look for OOM kills or crash loops in service logs. 3. Verify the /metrics endpoint is exposed and reachable by Prometheus. 4. Check for recent deployments or config changes."

      - alert: ETLWorkerDown
        expr: up{job="etl-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ETL worker is unreachable by Prometheus"
          description: "1. Check if the etl-worker service is running in Railway. 2. Look for OOM kills or crash loops in service logs. 3. Verify the /metrics endpoint is exposed and reachable by Prometheus. 4. Check for recent deployments or config changes."

  # ====================================================================
  # Temporal Worker Alerts — Critical
  # ====================================================================
  - name: temporal-critical-alerts
    rules:
      - alert: AgentsWorkerDead
        expr: temporal_num_pollers{job="agents-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agents worker has zero active pollers — worker is dead or disconnected from Temporal"
          description: "1. Check agents-worker logs for Temporal connection errors or panics. 2. Verify Temporal server is reachable from the worker. 3. Check if the worker process is running but stuck (zombie state). 4. Restart the worker if logs confirm it is unrecoverable."

      - alert: ETLWorkerDead
        expr: temporal_num_pollers{job="etl-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ETL worker has zero active pollers — worker is dead or disconnected from Temporal"
          description: "1. Check etl-worker logs for Temporal connection errors or panics. 2. Verify Temporal server is reachable from the worker. 3. Check if the worker process is running but stuck (zombie state). 4. Restart the worker if logs confirm it is unrecoverable."

      - alert: ActivityQueueBacklog
        expr: histogram_quantile(0.95, sum by (le, job, instance) (rate(temporal_activity_schedule_to_start_latency_bucket[5m]))) > 5000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Activity tasks are waiting > 5s in queue — not enough workers or activity slots"
          description: "1. Check temporal_worker_task_slots_available to see if workers are saturated. 2. Consider scaling up workers or increasing MaxConcurrentActivityExecutionSize. 3. Look for long-running activities that are hogging slots. 4. Check if a specific task queue is disproportionately backlogged."

      - alert: WorkflowTaskQueueBacklog
        expr: histogram_quantile(0.95, sum by (le, job, instance) (rate(temporal_workflow_task_schedule_to_start_latency_bucket[5m]))) > 2000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Workflow tasks are waiting > 2s in queue — not enough workers"
          description: "1. Check if workflow workers are running and have available task slots. 2. Look for sticky cache misses causing excessive replays that block slots. 3. Consider scaling up workers or increasing MaxConcurrentWorkflowTaskExecutionSize. 4. Check Temporal server health if all workers appear healthy."

  # ====================================================================
  # Temporal Worker Alerts — Warning
  # ====================================================================
  - name: temporal-warning-alerts
    rules:
      - alert: WorkerSaturated
        expr: min by (job, instance) (temporal_worker_task_slots_available{worker_type=~"ActivityWorker|activity"}) < 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker has fewer than 5 available activity slots — close to saturation"
          description: "1. Check which activities are consuming slots (look for long-running or stuck activities). 2. Consider increasing MaxConcurrentActivityExecutionSize if resources allow. 3. Scale up worker replicas to distribute the load. 4. If slots are stuck, check for activities waiting on external dependencies."

      - alert: HighWorkflowFailureRate
        expr: sum by (job, instance) (rate(temporal_workflow_failed[5m])) / clamp_min(sum by (job, instance) (rate(temporal_workflow_completed[5m]) + rate(temporal_workflow_failed[5m])), 0.001) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Workflow failure rate is above 5%"
          description: "1. Check workflow error logs to identify failing workflow types. 2. Look for recent code deployments that may have introduced bugs. 3. Verify downstream activity dependencies are healthy. 4. Check if failures are isolated to a specific task queue or workflow type."

      - alert: WorkflowTaskExecutionFailures
        expr: sum by (job, instance) (rate(temporal_workflow_task_execution_failed[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow task execution failures detected — possible non-determinism or workflow bug"
          description: "1. Check worker logs for NonDeterminismError — this means workflow code changed in a way that breaks replay of existing executions. 2. Look for recent workflow code deployments. 3. Verify that workflow logic is deterministic (no random, time, or external calls outside activities). 4. If non-determinism is confirmed, consider versioning the workflow or resetting stuck executions."

      - alert: ActivityFailureSpike
        expr: sum by (job, instance) (rate(temporal_activity_execution_failed[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Activity failures are elevated — check activity logs"
          description: "1. Check worker logs to identify which activity types are failing. 2. Look for external dependency issues (database, APIs, network). 3. Verify retry policies are configured — transient failures should be retried automatically. 4. Check if failures correlate with a recent deployment or config change."

      - alert: SlowActivities
        expr: histogram_quantile(0.95, sum by (le, job, instance) (rate(temporal_activity_execution_latency_bucket[5m]))) > 60000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Activity p95 latency is above 60 seconds"
          description: "1. Identify which activity types are slow using per-activity-type metrics. 2. Check if external dependencies (APIs, database) are responding slowly. 3. Look for resource contention (CPU, memory) on the worker. 4. Consider increasing activity timeouts if the slowness is expected, or optimizing the activity logic."

      - alert: TemporalGRPCFailureRateHigh
        expr: sum by (job, instance) (rate(temporal_request_failure[5m])) / sum by (job, instance) (rate(temporal_request[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "gRPC failure rate to Temporal server is above 5%"
          description: "1. Check Temporal server health and availability. 2. Look for network issues between workers and Temporal (DNS, firewall, TLS). 3. Check if Temporal server is overloaded (high CPU, connection limits). 4. Review worker logs for specific gRPC error codes (UNAVAILABLE, DEADLINE_EXCEEDED, etc.)."

      - alert: TemporalLongPollFailureRateHigh
        expr: sum by (job, instance) (rate(temporal_long_request_failure[5m])) / sum by (job, instance) (rate(temporal_long_request[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Long-poll failure rate to Temporal server is above 5% — worker may not be picking up tasks"
          description: "1. Long-poll failures mean the worker cannot maintain its polling connection to Temporal — this is a precursor to the worker appearing dead. 2. Check network stability between workers and Temporal server. 3. Verify Temporal server is not rejecting connections (rate limits, max connections). 4. Look for worker-side timeouts or TLS handshake failures in logs."

      - alert: StickyCachePressure
        expr: sum by (job, instance) (rate(temporal_sticky_cache_total_forced_eviction[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High sticky cache eviction rate — workflows are replaying frequently, impacting performance"
          description: "1. Too many concurrent workflows are evicting each other from cache. 2. Consider increasing the sticky cache size (WorkflowCacheSize option). 3. Check if the number of unique workflow types has grown unexpectedly. 4. Monitor temporal_sticky_cache_size to see current cache utilization."

      - alert: StickyCacheLowHitRatio
        expr: sum by (job, instance) (rate(temporal_sticky_cache_miss[5m])) / clamp_min(sum by (job, instance) (rate(temporal_sticky_cache_hit[5m]) + rate(temporal_sticky_cache_miss[5m])), 0.001) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sticky cache hit ratio is below 50% — workflows are replaying from scratch, degrading performance"
          description: "1. Most workflow tasks are replaying full history instead of resuming from cache — this increases latency and Temporal server load. 2. Increase WorkflowCacheSize to hold more workflows in memory. 3. Scale out workers so each handles fewer concurrent workflows. 4. Check if workflows have very long histories that make caching inefficient."

      - alert: WorkflowWorkerSaturated
        expr: min by (job, instance) (temporal_worker_task_slots_available{worker_type=~"WorkflowWorker|workflow"}) < 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Workflow worker has fewer than 5 available task slots — close to saturation"
          description: "1. Workflow task slots are nearly exhausted — new workflow tasks will queue up. 2. Check for workflows with large histories causing slow replays that hold slots. 3. Improve sticky cache hit ratio to reduce replay time per task. 4. Scale up workers or increase MaxConcurrentWorkflowTaskExecutionSize if resources allow."
