global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================================
  # API Service - FastAPI HTTP Metrics (Port 9090, internal only)
  # ============================================================================
  # Scrapes HTTP request metrics from prometheus_client HTTP server
  # (http_requests_total, http_request_duration_seconds, etc.)
  # Served on a separate port so metrics are NOT exposed on the public API.

  - job_name: 'api-prod'
    scheme: http
    static_configs:
      - targets: ['api.railway.internal:9090']
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-prod'
      - target_label: service
        replacement: 'api'
      - target_label: env
        replacement: 'prod'

  - job_name: 'api-dev'
    scheme: http
    static_configs:
      - targets: ['api-dev.railway.internal:9090']
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-dev'
      - target_label: service
        replacement: 'api'
      - target_label: env
        replacement: 'dev'

# ============================================================================
# NOTES
# ============================================================================
#
# After updating this file:
#   - Redeploy Prometheus service in Railway
#
# Verify scraping is working:
#   - Prometheus UI: http://prometheus:9090/targets
#   - All jobs should show as UP (green)
#
# Test queries in Prometheus Explore:
#   - http_requests_total
#   - http_request_duration_seconds_bucket
#
# Grafana Dashboard:
#   - Import: grafana/dashboards/api.json
