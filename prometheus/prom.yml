global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['${ALERTMANAGER_INTERNAL_URL}']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================================================
  # API Service - FastAPI HTTP Metrics (Port 9090, internal only)
  # ============================================================================
  # Scrapes HTTP request metrics from prometheus_client HTTP server
  # (http_requests_total, http_request_duration_seconds, etc.)
  # Served on a separate port so metrics are NOT exposed on the public API.

  - job_name: 'api'
    scheme: http
    dns_sd_configs:
      - names:
          - 'api.railway.internal'
        type: 'AAAA'
        port: 9090
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'

  # ============================================================================
  # Agents Worker - Temporal SDK Metrics (Port 9090, internal only)
  # ============================================================================
  # Scrapes Temporal SDK metrics (temporal_workflow_*, temporal_activity_*,
  # temporal_worker_*, temporal_sticky_cache_*, etc.)
  # Auto-exposed by the SDK's built-in Prometheus server.

  - job_name: 'agents-worker'
    scheme: http
    dns_sd_configs:
      - names:
          - 'agents-worker.railway.internal'
        type: 'AAAA'
        port: 9090
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'

  # ============================================================================
  # ETL Worker - Temporal SDK Metrics (Port 9090, internal only)
  # ============================================================================
  # Scrapes Temporal SDK metrics for ETL workflows (batch orchestration,
  # scraper workflows, response processing, etc.)

  - job_name: 'etl-worker'
    scheme: http
    dns_sd_configs:
      - names:
          - 'etl-worker.railway.internal'
        type: 'AAAA'
        port: 9090
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'

# ============================================================================
# NOTES
# ============================================================================
#
# After updating this file:
#   - Redeploy Prometheus service in Railway
#
# Verify scraping is working:
#   - Prometheus UI: http://prometheus:9090/targets
#   - All jobs should show as UP (green)
#
# Test queries in Prometheus Explore:
#   - http_requests_total
#   - http_request_duration_seconds_bucket
#   - temporal_num_pollers
#   - temporal_worker_task_slots_available
#
# Grafana Dashboard:
#   - Import: grafana/dashboards/api.json
